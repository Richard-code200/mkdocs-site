name: publish site
on:
  push:
    branches:
      - main # 确保你的主分支名称正确
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: pip install mkdocs-terminal
      - run: mkdocs gh-deploy --force
